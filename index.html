<!DOCTYPE html>
<html>
<body style="margin:0;overflow:hidden">

<script type="module">
import * as THREE from 'https://unpkg.com/three/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three/examples/jsm/controls/OrbitControls.js';
import { FBXLoader } from 'https://unpkg.com/three/examples/jsm/loaders/FBXLoader.js';

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,5,15);

const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls=new OrbitControls(camera,renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

/* 🌌 360 IMAGE DIRECTEMENT INCLUSE */
new THREE.TextureLoader().load('space360.jpg',t=>{
t.mapping=THREE.EquirectangularReflectionMapping;
scene.background=t;
});

const loader=new FBXLoader();

/* 👨‍🚀 */
loader.load('Astronaut.fbx',o=>{
o.position.set(0,1,0);
scene.add(o);
});

/* 🐹 */
loader.load('Space_humster.fbx',o=>{
o.position.set(3,1,0);
scene.add(o);
});

/* ☄️ */
for(let i=0;i<20;i++){
const a=new THREE.Mesh(
new THREE.IcosahedronGeometry(0.5),
new THREE.MeshStandardMaterial({color:0x888888})
);
a.position.set((Math.random()-0.5)*20,0,(Math.random()-0.5)*20);
scene.add(a);
}

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

</script>

<body>
</html>
