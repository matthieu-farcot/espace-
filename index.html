<!DOCTYPE html>
<html>
<head>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>

<a-scene>

<!-- 🌌 Image 360 -->
<a-sky src="space360.jpg"></a-sky>

<!-- 👨‍🚀 Astronaute -->
<a-entity gltf-model="Astronaut.glb"
position="0 0 -4"
scale="0.5 0.5 0.5">
</a-entity>

<!-- 🐹 Hamster -->
<a-entity gltf-model="Space_humster.glb"
position="2 0 -4"
scale="0.5 0.5 0.5">
</a-entity>

<!-- 🏗️ Plateforme -->
<a-cylinder radius="4" height="0.5" color="#666"
position="0 -0.25 -4">
</a-cylinder>

<!-- 🎮 Caméra -->
<a-camera position="0 1.6 0"></a-camera>

</a-scene>

</body>
</html>
